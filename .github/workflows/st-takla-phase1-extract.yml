name: St-Takla Phase 1 Extract

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Phase 1 extraction
        run: node scripts/st-takla-scraper/extract-phase1.mjs

      - name: Upload extraction artifacts
        uses: actions/upload-artifact@v4
        with:
          name: st-takla-phase1-output
          path: |
            scripts/st-takla-scraper/output/*.json
            scripts/st-takla-scraper/output/*.csv
            scripts/st-takla-scraper/output/extraction-report.md
